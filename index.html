<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Caprice des Îles — Carte du restaurant, saveurs des Antilles">
  <meta name="theme-color" content="#FBF6E9">
  <title>Caprice des Îles — Menu</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ========== LOADER ==========
       Quand tu auras le SVG du logo, remplace l'<img> ci-dessous par le SVG inline
       pour un loader 100% vectoriel et animable. -->
  <div id="loader" class="loader" aria-hidden="true">
    <div class="loader-inner">
      <img src="img/logo.svg" alt="" class="loader-logo">
      <div class="loader-ring"></div>
    </div>
  </div>

  <!-- ========== FEUILLES DÉCORATIVES (fixes en arrière-plan) ========== -->
  <div class="decor-leaves" aria-hidden="true">
    <svg class="leaf leaf--top-left" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
        <path d="M20 20 Q100 40 180 100"/>
        <path d="M20 20 L60 35"/><path d="M20 20 L55 50"/><path d="M20 20 L50 65"/>
        <path d="M35 25 L70 55"/><path d="M50 30 L85 65"/><path d="M65 33 L100 72"/>
        <path d="M80 38 L115 80"/><path d="M95 45 L130 88"/><path d="M110 53 L145 95"/>
        <path d="M125 62 L160 102"/><path d="M140 72 L172 108"/>
      </g>
    </svg>
    <svg class="leaf leaf--bottom-right" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
        <path d="M180 180 Q100 160 20 100"/>
        <path d="M180 180 L140 165"/><path d="M180 180 L145 150"/><path d="M180 180 L150 135"/>
        <path d="M165 175 L130 145"/><path d="M150 170 L115 135"/><path d="M135 167 L100 128"/>
        <path d="M120 162 L85 120"/><path d="M105 155 L70 112"/><path d="M90 147 L55 105"/>
        <path d="M75 138 L40 98"/><path d="M60 128 L28 92"/>
      </g>
    </svg>
    <svg class="leaf leaf--mid-right" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
        <path d="M180 30 Q120 80 40 170"/>
        <path d="M180 30 L155 50"/><path d="M170 45 L140 65"/><path d="M158 60 L125 80"/>
        <path d="M145 75 L110 95"/><path d="M130 90 L95 112"/><path d="M115 108 L80 130"/>
        <path d="M100 125 L65 148"/><path d="M80 145 L50 165"/>
      </g>
    </svg>
  </div>

  <!-- ========== HEADER ========== -->
  <header class="site-header" id="top">
    <div class="header-inner">
      <a href="#top" class="logo-link" aria-label="Caprice des Îles — Retour en haut">
        <img src="img/logo.png" alt="Caprice des Îles" class="logo">
      </a>

      <div class="lang-toggle" role="group" aria-label="Choix de la langue">
        <button type="button" class="lang-btn active" data-lang="fr" aria-pressed="true" aria-label="Français">FR</button>
        <span class="lang-sep" aria-hidden="true">/</span>
        <button type="button" class="lang-btn" data-lang="en" aria-pressed="false" aria-label="English">EN</button>
      </div>
    </div>
  </header>

  <!-- ========== NAV CATÉGORIES ========== -->
  <nav class="category-nav" aria-label="Navigation des catégories">
    <div class="category-nav-inner">
      <ul id="category-nav-list"></ul>
    </div>
  </nav>

  <!-- ========== MAIN ========== -->
  <main id="menu-container" class="menu-container">
    <p class="loading-state" id="loading-state">Chargement de la carte…</p>
  </main>

  <!-- ========== FOOTER avec mentions légales ========== -->
  <footer class="site-footer">
    <div class="footer-main">
      <p class="footer-name">Caprice des Îles</p>
      <p class="footer-tagline" data-i18n="footer-tagline">Saveurs des Antilles</p>
    </div>

    <div class="footer-legal">
      <p class="footer-credits">
        <span data-i18n="credits-text">Design &amp; développement par</span>
        <a href="#" target="_blank" rel="noopener">Chrisnaël</a>
        — <span id="current-year"></span>
      </p>
      <p class="footer-host" data-i18n="hosting">Hébergé sur GitHub Pages</p>
      <p class="footer-mentions">
        <a href="#" data-i18n="legal-link">Mentions légales</a>
      </p>
    </div>
  </footer>

  <!-- Bouton retour en haut -->
  <button type="button" id="back-to-top" class="back-to-top" aria-label="Retour en haut de la page">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 19V5M5 12l7-7 7 7"/>
    </svg>
  </button>

  <script src="js/app.js"></script>
</body>
</html>
